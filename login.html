<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login | GroSync</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/auth.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-box">

      <h1 class="app-title">Gro<span>Sync</span></h1>

      <!-- Email/Password Form -->
      <div id="email-login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="john@gmail.com">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="********">
        </div>

        <button class="primary-btn" onclick="login()">Login</button>

        <p class="bottom-text">
          <a href="#" onclick="forgotPassword()">Forgot password?</a>
        </p>
      </div>



      <p class="bottom-text">
        New user? <a href="signup.html">Sign up</a>
      </p>

    </div>
  </div>

  <!-- RESET PASSWORD MODAL -->
  <div id="resetModal" class="modal-overlay" style="display: none;">
    <div class="modal">
      <h3 style="margin-bottom: 20px;">Reset Password</h3>

      <div id="reset-step-1">
        <div class="form-group">
          <label>Mobile Number or Email</label>
          <input type="text" id="reset-identifier" class="pill-input" placeholder="enter here">
        </div>
        <button class="primary-btn" onclick="sendResetOtp()">Send OTP</button>
      </div>

      <div id="reset-step-2" style="display: none;">
        <div class="form-group">
          <label>Enter OTP</label>
          <input type="text" id="reset-otp" placeholder="123456" maxlength="6">
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="reset-new-password" placeholder="New Password">
        </div>
        <button class="primary-btn" onclick="resetPassword()">Reset Password</button>
      </div>

      <button class="secondary-btn" onclick="closeResetModal()" style="margin-top: 10px;">Cancel</button>
    </div>
  </div>

  <script src="js/auth.js"></script>


</body>

</html>
