<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>GroSync</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/home.css" />
  <link rel="stylesheet" href="css/qty-button.css" />

  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body class="category-page">


  <!-- ================= HEADER ================= -->
  <header class="top-bar">
    <div class="logo" onclick="window.location.href='home.html'" style="cursor:pointer">
      <span class="gro">GroSync</span>
      <div class="eco-badge">
        <i class="ri-leaf-line"></i>
        <span>Eco-Friendly</span>
      </div>
    </div>

    <div class="actions">
      <!-- Join Group Buy (Hidden by default or shown if needed) -->
      <div class="join-group-wrap" style="margin-right: 15px; display: none;" id="joinGroupWrap">
        <input type="text" id="joinCodeInput" placeholder="Invite Code" class="group-join-input"
          style="width: 100px; padding: 6px; border-radius: 4px; border: 1px solid #ddd;">
        <button class="join-btn" onclick="openJoinModal()"
          style="background: #3b1a86; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;">
          Join
        </button>
      </div>

      <div class="icon-btn" id="cartBtn" onclick="window.location.href='cart.html'">
        <i class="ri-shopping-cart-2-line"></i>
        <span class="cart-badge" id="cartBadge">0</span>
      </div>

      <button id="authBtn" class="login-btn" style="display: none;">
        Login / Signup
      </button>

      <div class="user-menu-container">
        <div id="userAvatar" class="user-avatar" onclick="toggleUserDropdown(event)">U</div>
        <div id="userDropdown" class="user-dropdown">
          <div class="dropdown-header">
            <span id="dropdownUserName">User</span>
          </div>
          <hr>
          <a href="profile.html"><i class="ri-user-line"></i> My Profile</a>
          <a href="profile.html?tab=settings"><i class="ri-settings-4-line"></i> Settings</a>
          <a href="profile.html?tab=orders"><i class="ri-shopping-bag-3-line"></i> My Orders</a>
          <hr>
          <a href="#" onclick="logoutUser()" class="logout-link"><i class="ri-logout-box-r-line"></i> Logout</a>
        </div>
      </div>
    </div>
  </header>

  <section class="categories-section" id="catSection" style="display:none;">
    <div class="category-scroll" id="categoryScroll"></div>
  </section>

  <h2 id="title" style="padding:20px;"></h2>
  <div class="vertical-grid" id="grid"></div>


  <script src="js/constants.js" defer></script>
  <script src="js/home.js" defer></script>
  <script src="js/products-section.js" defer></script>
  <script src="js/category.js" defer></script>



</body>

</html>
