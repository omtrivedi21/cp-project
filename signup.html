<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up | GroSync</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <div class="auth-page">
        <div class="auth-box">

            <h1 class="app-title">Gro<span>Sync</span></h1>

            <!-- STEP 1 -->
            <div id="step1">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="john@gmail.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="********">
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirm" placeholder="********">
                </div>

                <button class="primary-btn" onclick="signup()">Submit</button>
            </div>

        </div>
    </div>

    <script src="js/auth.js"></script>


</body>

</html>
